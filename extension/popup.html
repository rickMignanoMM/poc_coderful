<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1c1c1e;
      color: #f2f2f7;
    }
    .header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid #2c2c2e;
    }
    .header h1 { font-size: 14px; font-weight: 600; color: #f2f2f7; }
    .header p  { font-size: 11px; color: #8e8e93; margin-top: 2px; }

    .status {
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #2c2c2e;
    }
    .dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #3a3a3c; flex-shrink: 0;
    }
    .dot.idle    { background: #3a3a3c; }
    .dot.active  { background: #ff3b30; animation: pulse 1s ease-in-out infinite; }
    .dot.uploading { background: #ff9f0a; animation: pulse 0.6s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:.5; transform:scale(1.2); } }

    .status-text { font-size: 13px; }
    .status-text .label { font-weight: 500; }
    .status-text .timer { font-size: 11px; color: #8e8e93; margin-top: 1px; }

    .not-meet {
      padding: 20px 16px;
      text-align: center;
      font-size: 12px;
      color: #8e8e93;
      line-height: 1.5;
    }
    .not-meet span { display: block; font-size: 28px; margin-bottom: 8px; }

    .actions { padding: 12px 16px; }
    button {
      width: 100%; padding: 10px;
      border: none; border-radius: 10px;
      font-size: 14px; font-weight: 600;
      cursor: pointer; transition: opacity 0.15s;
    }
    button:active { opacity: 0.75; }
    .btn-start  { background: #ff3b30; color: #fff; }
    .btn-stop   { background: #3a3a3c; color: #fff; }
    .btn-stop:hover { background: #48484a; }

    .settings { padding: 0 16px 14px; }
    .settings label { font-size: 11px; color: #8e8e93; display: block; margin-bottom: 4px; }
    .settings input {
      width: 100%; padding: 7px 10px;
      background: #2c2c2e; border: 1px solid #3a3a3c;
      border-radius: 8px; color: #f2f2f7; font-size: 12px;
      outline: none;
    }
    .settings input:focus { border-color: #007aff; }

    .msg {
      margin: 0 16px 12px;
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 12px;
      display: none;
    }
    .msg.ok    { background: #1c3a2a; color: #30d158; display: block; }
    .msg.error { background: #3a1c1c; color: #ff6961; display: block; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🎙 Meet Recorder</h1>
    <p>Backoffice Note Audio</p>
  </div>

  <div id="not-meet" class="not-meet" style="display:none">
    <span>📹</span>
    Apri una riunione su<br><strong>meet.google.com</strong><br>per iniziare la registrazione.
  </div>

  <div id="main" style="display:none">
    <div class="status">
      <div id="dot" class="dot idle"></div>
      <div class="status-text">
        <div id="status-label" class="label">Pronto</div>
        <div id="timer" class="timer" style="display:none"></div>
      </div>
    </div>

    <div id="msg" class="msg"></div>

    <div class="actions">
      <button id="btn-start" class="btn-start">⏺ Inizia registrazione</button>
      <button id="btn-stop"  class="btn-stop"  style="display:none">⏹ Ferma e invia</button>
    </div>

    <div class="settings">
      <label>URL Backoffice</label>
      <input id="backend-url" type="text" placeholder="http://localhost:3000" />
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
